site_name: qrt — Quant Research Tools
site_description: One consistent API over the fragmented quant Python ecosystem
site_author: quantbert
repo_url: https://github.com/quantbert/qrt
repo_name: quantbert/qrt

theme:
  name: material
  palette:
    - scheme: slate
      primary: white
      accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - navigation.expand

nav:
  - Getting Started: index.md
  - Feature Engineering: feat.md
  - API Reference:
      - q.feat: api/feat.md
      - q.plot: api/plot.md
      - q.vendors: api/vendors.md
      - q.dataload: api/dataload.md
      - q.utils: api/utils.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - open-in-new-tab
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            members_order: source

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
