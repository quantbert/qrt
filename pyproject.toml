[project]
name = "qrt"
version = "0.0.1"
description = "Quant Research Tools"
readme = "README.md"
requires-python = ">=3.13"
license = { file = "LICENSE" }
dependencies = [
    "duckdb>=1.5.4",
    "ipykernel>=7.3.0",
    "matplotlib>=3.11.0",
    "pandas>=3.0",
    "pandas-ta-classic>=0.6.52",
    "pyarrow>=17.0",
    "requests>=2.32",
    "ta-lib>=0.7.0",
    "torch>=2.13.0",
    "tqdm>=4.68.4",
    "yfinance>=1.5.1",
]


[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["qrt"]
