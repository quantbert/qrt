[project]
name = "qrt"
version = "0.0.1"
description = "Quant Research Tools"
readme = "README.md"
requires-python = ">=3.13"
license = { file = "LICENSE" }
dependencies = [
    "matplotlib>=3.11.0",
    "pandas>=3.0",
    "torch>=2.13.0",
    "tqdm>=4.68.4",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["qrt"]
