[project]
name = "pyqrt"
version = "0.0.6"
description = "Quant Research Tools"
readme = "README.md"
requires-python = ">=3.13"
license = { file = "LICENSE" }
authors = [{ name = "Iman Karimi" }]
dependencies = [
    "duckdb>=1.5.4",
    "ipykernel>=7.3.0",
    "kaleido>=1.0",
    "nbformat>=5.10",
    "pandas>=3.0",
    "pandas-ta-classic>=0.6.52",
    "plotly>=6.0",
    "pyarrow>=17.0",
    "requests>=2.32",
    "ta-lib>=0.7.0",
    "torch>=2.13.0",
    "tqdm>=4.68.4",
    "yfinance>=1.5.1",
]

[project.urls]
Documentation = "https://quantbert.github.io/qrt/"
Repository = "https://github.com/quantbert/qrt"

[project.entry-points.nbdev]
qrt = "qrt._modidx:d"

[dependency-groups]
dev = [
    "pytest>=8.0",
]
docs = [
    "ipykernel>=7.3.0",
    "nbclient>=0.11.0",
    "nbdev>=3.2.2",
    "pdoc>=15.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["qrt"]
# qrt/**/*.py is generated by `make export` (from nbs/) and gitignored, not
# committed. hatchling's default file selection follows .gitignore, so it
# would otherwise silently omit the whole package from wheels/editable
# installs. `make export` must run before building/installing.
ignore-vcs = true

[tool.nbdev]
lib_path = "qrt"
# Static version lives in [project.version] (bumped via `uv version --bump patch`);
# don't let nbdev also stamp qrt/__init__.py.
put_version_in_init = false
