project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"
    - "**/*.ipynb"
    - "env/index.ipynb"
    - "env/roadmap.qmd"

# tell quarto to read the sidebar generated by quartodoc
metadata-files:
  - reference/_sidebar.yml

website:
  title: "qrt"
  description: "One consistent API over the fragmented quant Python ecosystem"
  site-url: https://quantbert.github.io/qrt/
  repo-url: https://github.com/quantbert/qrt
  repo-actions: [edit, source, issue]
  search: true
  page-navigation: true
  back-to-top-navigation: true
  navbar:
    title: "qrt — Quant Research Tools"
    search: true
    left:
      - text: "Getting Started"
        href: index.qmd
      - text: "API Reference"
        href: reference/index.qmd
      - text: "Roadmap"
        href: roadmap.qmd
    tools:
      - icon: github
        href: https://github.com/quantbert/qrt
  sidebar:
    # Left-docked module tree: one folder per qrt submodule under docs/,
    # each with an index landing page plus per-topic pages. Page order is
    # defined here, so file names don't need numeric prefixes.
    - id: docs
      style: docked
      collapse-level: 1
      contents:
        - text: "Getting Started"
          href: index.qmd
        - section: "q.bt — Backtesting"
          href: bt/index.qmd
          contents:
            - text: "Roadmap"
              href: bt/roadmap.qmd
        - section: "q.data — Data"
          href: data/index.qmd
          contents:
            - text: "Sample datasets"
              href: data/datasets.ipynb
            - text: "Data schemas"
              href: data/schemas.ipynb
            - text: "Local files"
              href: data/local.ipynb
            - text: "Market data sources"
              href: data/sources.ipynb
            - text: "Roadmap"
              href: data/roadmap.qmd
        - section: "q.indicator — Indicators"
          href: indicator/index.ipynb
          contents:
            - section: "QRT indicators"
              contents:
                - text: "Simple moving average (SMA)"
                  href: indicator/qrt/sma.ipynb
                - text: "Exponential moving average (EMA)"
                  href: indicator/qrt/ema.ipynb
                - text: "Log returns"
                  href: indicator/qrt/log_returns.ipynb
                - text: "Realized variance"
                  href: indicator/qrt/realized_variance.ipynb
                - text: "Realized quarticity"
                  href: indicator/qrt/realized_quarticity.ipynb
                - text: "Bipower variation"
                  href: indicator/qrt/bipower_variation.ipynb
                - text: "Median realized volatility"
                  href: indicator/qrt/med_rv.ipynb
                - text: "Minimum realized volatility"
                  href: indicator/qrt/min_rv.ipynb
                - text: "Realized volatility by session"
                  href: indicator/qrt/realized_volatility.ipynb
                - text: "Relative strength"
                  href: indicator/qrt/relative_strength.ipynb
                - text: "Relative-strength moving average"
                  href: indicator/qrt/rsma.ipynb
                - text: "Relative-strength days"
                  href: indicator/qrt/rs_days.ipynb
                - text: "Relative-strength phase"
                  href: indicator/qrt/rs_phase.ipynb
                - text: "RS new high before price"
                  href: indicator/qrt/rsnhbp.ipynb
            - text: "TA-Lib"
              href: indicator/talib.ipynb
            - text: "pandas-ta-classic"
              href: indicator/pandas_ta.ipynb
            - text: "Roadmap"
              href: indicator/roadmap.qmd
        - section: "q.factor — Factors"
          href: factor/index.qmd
          contents:
            - text: "Roadmap"
              href: factor/roadmap.qmd
        - section: "q.feature — Feature lifecycle"
          href: feature/index.qmd
          contents:
            - text: "Roadmap"
              href: feature/roadmap.qmd
        - section: "q.preprocess — Preprocessing"
          href: preprocess/index.qmd
          contents:
            - text: "Missing data"
              href: preprocess/impute.qmd
            - text: "Scaling"
              href: preprocess/scale.qmd
            - text: "Outliers"
              href: preprocess/outlier.qmd
            - text: "Encoding"
              href: preprocess/encode.qmd
            - text: "Reduction"
              href: preprocess/reduction.qmd
            - text: "Selection"
              href: preprocess/selection.qmd
            - text: "Roadmap"
              href: preprocess/roadmap.qmd
        - section: "q.calendar — Market time"
          href: calendar/index.qmd
          contents:
            - text: "Roadmap"
              href: calendar/roadmap.qmd
        - section: "q.signal — Signals"
          href: signal/index.qmd
          contents:
            - text: "Roadmap"
              href: signal/roadmap.qmd
        - section: "q.model — Models"
          href: model/index.ipynb
          contents:
            - text: "Roadmap"
              href: model/roadmap.qmd
        - section: "q.env — Environment"
          href: env/index.ipynb
          contents:
            - text: "Roadmap"
              href: env/roadmap.qmd
        - section: "q.plot — Plotting"
          href: plot/index.qmd
          contents:
            - text: "Return charts"
              href: plot/returns.ipynb
            - text: "Tearsheet report"
              href: plot/report.ipynb
            - text: "Simulation tests"
              href: plot/simulation.ipynb
            - text: "Trade logs"
              href: plot/trades.ipynb
            - text: "Saving figures"
              href: plot/saving.qmd
            - text: "Roadmap"
              href: plot/roadmap.qmd
        - section: "q.portfolio — Portfolio"
          href: portfolio/index.qmd
          contents:
            - text: "Roadmap"
              href: portfolio/roadmap.qmd
        - section: "q.stats — Statistics"
          href: stats/index.qmd
          contents:
            - text: "Performance & benchmark"
              href: stats/performance.ipynb
            - text: "Rolling & calendar returns"
              href: stats/rolling.ipynb
            - text: "Factor analytics"
              href: stats/factors.ipynb
            - text: "Chained API"
              href: stats/chained.ipynb
            - text: "Roadmap"
              href: stats/roadmap.qmd
        - section: "q.utils — Utilities"
          href: utils/index.ipynb
          contents:
            - text: "Roadmap"
              href: utils/roadmap.qmd
        - text: "Roadmap"
          href: roadmap.qmd

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    grid:
      body-width: 1000px
    css:
      - reference/_styles-quartodoc.css

quartodoc:
  package: qrt
  dir: reference
  sidebar: reference/_sidebar.yml
  css: reference/_styles-quartodoc.css
  parser: google
  sections:
    - title: q.indicator
      desc: "Single-instrument market measurements and explicit provider catalogs."
      contents:
        - name: indicator
          include_imports: true
        - name: indicator.talib
          members: []
        - name: indicator.pandas_ta
          members: []
    - title: q.factor
      desc: "Cross-sectional characteristics, rankings, and neutralization."
      contents:
        - name: factor
          include_imports: true
    - title: q.feature
      desc: "Named, versioned feature definitions, computation, and materialization."
      contents:
        - name: feature
          include_imports: true
        - name: feature.ops
          include_imports: true
    - title: q.preprocess
      desc: "Fitted transformations applied at the model-training boundary."
      contents:
        - preprocess
        - preprocess.impute
        - preprocess.scale
        - preprocess.outlier
        - preprocess.encode
        - preprocess.reduction
        - preprocess.selection
    - title: q.calendar
      desc: "Exchange sessions, closures, and market-time operations."
      contents:
        - name: calendar
          include_imports: true
    - title: q.signal
      desc: "Investment intent derived from indicators, factors, models, and rules."
      contents:
        - signal
    - title: q.stats
      desc: "Return-stream statistics: performance, alpha/beta, rolling diagnostics, and the chained `Returns` helper (no plotting dependency)."
      contents:
        - name: stats
          include_imports: true
    - title: q.plot
      desc: "Plotting + performance reports (tearsheets)."
      contents:
        - name: plot
          include_imports: true
        - plot.interactive
    - title: q.data
      desc: "Loading/saving local files, market data sources (Yahoo Finance, Binance, DuckDB) each exposed as their own submodule, prepackaged sample datasets, and the master securities database."
      contents:
        - name: data
          include_imports: true
        - data.local
        - data.datasets
        - name: data.sources
          include_imports: true
        - data.sources.yfinance
        - data.sources.binance
        - data.sources.duckdb
    - title: q.model
      desc: "ML model utilities: PyTorch helpers (model summaries via torchinfo) and leakage-aware CV splitters named after scikit-learn's model_selection."
      contents:
        - name: model
          include_imports: true
        - model.torch
        - model.selection
    - title: q.env
      desc: "Environment variables, runtime inspection, hardware reports, and declarative requirements."
      contents:
        - env
    - title: q.utils
      desc: "Shared utilities."
      contents:
        - utils
