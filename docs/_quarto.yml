project:
  type: website
  output-dir: _site

# tell quarto to read the sidebar generated by quartodoc
metadata-files:
  - reference/_sidebar.yml

website:
  title: "qrt"
  description: "One consistent API over the fragmented quant Python ecosystem"
  site-url: https://quantbert.github.io/qrt/
  repo-url: https://github.com/quantbert/qrt
  repo-actions: [edit, source, issue]
  search: true
  page-navigation: true
  back-to-top-navigation: true
  navbar:
    title: "qrt — Quant Research Tools"
    search: true
    left:
      - text: "Getting Started"
        href: index.qmd
      - text: "Feature Engineering"
        href: feat.qmd
      - text: "Interactive Demo"
        href: demo.qmd
      - text: "API Reference"
        href: reference/index.qmd
    tools:
      - icon: github
        href: https://github.com/quantbert/qrt

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    grid:
      body-width: 1000px
    css:
      - reference/_styles-quartodoc.css

quartodoc:
  package: qrt
  dir: reference
  sidebar: reference/_sidebar.yml
  css: reference/_styles-quartodoc.css
  parser: google
  sections:
    - title: q.feat
      desc: "Feature engineering — own indicators, TA-Lib, pandas-ta-classic."
      contents:
        - feat
        - name: feat.qta
          include_imports: true
        - name: feat.talib
          members: []
        - name: feat.pandas_ta
          members: []
    - title: q.plot
      desc: "Plotting + performance reports (tearsheets)."
      contents:
        - name: plot
          include_imports: true
        - plot.interactive
    - title: q.vendors
      desc: "Market data vendors with parquet caching."
      contents:
        - vendors
        - vendors.base
        - vendors.yfinance
        - vendors.binance
    - title: q.dataload
      desc: "Loading and aggregating raw trade data into OHLC bars."
      contents:
        - dataload
    - title: q.utils
      desc: "Shared utilities."
      contents:
        - utils
