format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    grid:
      body-width: 1000px
      sidebar-width: 300px
    css:
      - reference/_styles-quartodoc.css

quartodoc:
  package: qrt
  dir: reference
  sidebar: reference/_sidebar.yml
  css: reference/_styles-quartodoc.css
  parser: google
  sections:
    - title: q.indicator
      desc: "Single-instrument market measurements and explicit provider catalogs."
      contents:
        - name: indicator
          include_imports: true
        - name: indicator.talib
          members: []
        - name: indicator.pandas_ta
          members: []
    - title: q.cross_section
      desc: "Cross-sectional characteristics, rankings, and neutralization."
      contents:
        - name: cross_section
          include_imports: true
    - title: q.risk
      desc: "Downside and tail-risk estimators expressed as loss magnitudes."
      contents:
        - name: risk
          include_imports: true
    - title: q.label
      desc: "Future-aware financial labels, event detection, and overlap-aware sample weights."
      contents:
        - name: label
          include_imports: true
    - title: q.dataset
      desc: "Aligned model inputs, targets, sample weights, metadata, and split schemes."
      contents:
        - name: dataset
          include_imports: true
    - title: q.transform
      desc: "Fitted transformations applied at the model-training boundary."
      contents:
        - name: transform
          include_imports: true
        - transform.impute
        - transform.scale
        - transform.outlier
        - transform.encode
        - transform.reduction
        - transform.selection
    - title: q.calendar
      desc: "Exchange sessions, closures, and market-time operations."
      contents:
        - name: calendar
          include_imports: true
    - title: q.signal
      desc: "Investment intent derived from indicators, factors, models, and rules."
      contents:
        - signal
    - title: q.stats
      desc: "Reusable return-stream and classification statistics, including performance, rolling diagnostics, and multiclass evaluation curves (no plotting dependency)."
      contents:
        - name: stats
          include_imports: true
    - title: q.plot
      desc: "Interactive classification diagnostics, return-stream charts, trade visualizations, and performance reports."
      contents:
        - name: plot
          include_imports: true
        - plot.interactive
    - title: q.data
      desc: "Loading/saving local files, market data sources (Yahoo Finance, Binance, DuckDB) each exposed as their own submodule, prepackaged sample datasets, and the master securities database."
      contents:
        - name: data
          include_imports: true
        - data.clean
        - data.local
        - data.datasets
        - name: data.sources
          include_imports: true
        - data.sources.yfinance
        - data.sources.binance
        - data.sources.duckdb
    - title: q.model
      desc: "ML model utilities: PyTorch helpers and a compatibility bridge for sklearn time-series position arrays."
      contents:
        - name: model
          include_imports: true
        - model.torch
        - model.selection
    - title: q.env
      desc: "Environment variables, runtime inspection, hardware reports, and declarative requirements."
      contents:
        - env
    - title: q.utils
      desc: "Shared utilities."
      contents:
        - utils
