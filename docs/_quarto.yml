project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"
    - "**/*.ipynb"
    - "env/index.ipynb"
    - "env/roadmap.qmd"

execute:
  freeze: auto

# tell quarto to read the sidebar generated by quartodoc
metadata-files:
  - reference/_sidebar.yml

website:
  title: "qrt"
  description: "One consistent API over the fragmented quant Python ecosystem"
  site-url: https://quantbert.github.io/qrt/
  repo-url: https://github.com/quantbert/qrt
  repo-actions: [edit, source, issue]
  search: true
  page-navigation: true
  back-to-top-navigation: true
  navbar:
    title: "qrt — Quant Research Tools"
    search: true
    left:
      - text: "Getting Started"
        href: index.qmd
      - text: "API Reference"
        href: reference/index.qmd
      - text: "Roadmap"
        href: roadmap.qmd
    tools:
      - icon: github
        href: https://github.com/quantbert/qrt
  sidebar:
    # Left-docked module tree: one folder per qrt submodule under docs/,
    # each with an index landing page plus per-topic pages. Page order is
    # defined here, so file names don't need numeric prefixes.
    - id: docs
      style: docked
      collapse-level: 1
      contents:
        - text: "Getting Started"
          href: index.qmd
        - section: "q.bt — Backtesting"
          href: bt/index.qmd
          contents:
            - text: "Roadmap"
              href: bt/roadmap.qmd
        - section: "q.data — Data"
          href: data/index.qmd
          contents:
            - text: "Sample datasets"
              href: data/datasets.ipynb
            - text: "Data schemas"
              href: data/schemas.ipynb
            - text: "Local files"
              href: data/local.ipynb
            - text: "Market data sources"
              href: data/sources.ipynb
            - text: "Roadmap"
              href: data/roadmap.qmd
        - section: "q.indicator — Indicators"
          href: indicator/index.ipynb
          contents:
            - section: "QRT indicators"
              contents:
                - text: "Simple moving average (SMA)"
                  href: indicator/qrt/sma.ipynb
                - text: "Exponential moving average (EMA)"
                  href: indicator/qrt/ema.ipynb
                - text: "Mean absolute deviation (MADEV)"
                  href: indicator/qrt/madev.ipynb
                - text: "Volume spike ratio"
                  href: indicator/qrt/volume_spike_ratio.ipynb
                - text: "Price spikes"
                  href: indicator/qrt/price_spikes.ipynb
                - text: "Log returns"
                  href: indicator/qrt/log_returns.ipynb
                - text: "Realized variance"
                  href: indicator/qrt/realized_variance.ipynb
                - text: "Realized quarticity"
                  href: indicator/qrt/realized_quarticity.ipynb
                - text: "Bipower variation"
                  href: indicator/qrt/bipower_variation.ipynb
                - text: "Median realized volatility"
                  href: indicator/qrt/med_rv.ipynb
                - text: "Minimum realized volatility"
                  href: indicator/qrt/min_rv.ipynb
                - text: "Realized volatility by session"
                  href: indicator/qrt/realized_volatility.ipynb
                - text: "Relative strength"
