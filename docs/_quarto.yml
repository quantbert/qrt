project:
  type: website
  output-dir: _site

# tell quarto to read the sidebar generated by quartodoc
metadata-files:
  - reference/_sidebar.yml

website:
  title: "qrt"
  description: "One consistent API over the fragmented quant Python ecosystem"
  site-url: https://quantbert.github.io/qrt/
  repo-url: https://github.com/quantbert/qrt
  repo-actions: [edit, source, issue]
  search: true
  page-navigation: true
  back-to-top-navigation: true
  navbar:
    title: "qrt — Quant Research Tools"
    search: true
    left:
      - text: "Getting Started"
        href: index.ipynb
      - text: "API Reference"
        href: reference/index.qmd
      - text: "Roadmap"
        href: roadmap.qmd
    tools:
      - icon: github
        href: https://github.com/quantbert/qrt
  sidebar:
    # Left-docked module tree: one folder per qrt submodule under docs/,
    # each with an index landing page plus per-topic pages. Page order is
    # defined here, so file names don't need numeric prefixes.
    - id: docs
      style: docked
      collapse-level: 1
      contents:
        - text: "Getting Started"
          href: index.ipynb
        - section: "q.bt — Backtesting"
          href: bt/index.qmd
        - section: "q.data — Data"
          href: data/index.qmd
          contents:
            - text: "Sample datasets"
              href: data/datasets.ipynb
            - text: "Data schemas"
              href: data/schemas.ipynb
            - text: "Local files"
              href: data/local.ipynb
            - text: "Market data sources"
              href: data/sources.ipynb
        - section: "q.feat — Features"
          href: feat/index.qmd
          contents:
            - text: "qta — our own features"
              href: feat/qta.ipynb
            - text: "TA-Lib"
              href: feat/talib.ipynb
            - text: "pandas-ta-classic"
              href: feat/pandas_ta.ipynb
        - section: "q.model — Models"
          href: model/index.ipynb
        - section: "q.plot — Plotting"
          href: plot/index.qmd
          contents:
            - text: "Return charts"
              href: plot/returns.ipynb
            - text: "Tearsheet report"
              href: plot/report.ipynb
            - text: "Simulation tests"
              href: plot/simulation.ipynb
            - text: "Trade logs"
              href: plot/trades.ipynb
            - text: "Saving figures"
              href: plot/saving.qmd
        - section: "q.portfolio — Portfolio"
          href: portfolio/index.qmd
        - section: "q.stats — Statistics"
          href: stats/index.qmd
          contents:
            - text: "Performance & benchmark"
              href: stats/performance.ipynb
            - text: "Rolling & calendar returns"
              href: stats/rolling.ipynb
            - text: "Factor analytics"
              href: stats/factors.ipynb
            - text: "Chained API"
              href: stats/chained.ipynb
        - section: "q.utils — Utilities"
          href: utils/index.ipynb
        - text: "Roadmap"
          href: roadmap.qmd

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    grid:
      body-width: 1000px
    css:
      - reference/_styles-quartodoc.css

quartodoc:
  package: qrt
  dir: reference
  sidebar: reference/_sidebar.yml
  css: reference/_styles-quartodoc.css
  parser: google
  sections:
    - title: q.feat
      desc: "Feature engineering — own indicators, TA-Lib, pandas-ta-classic."
      contents:
        - feat
        - name: feat.qta
          include_imports: true
        - name: feat.talib
          members: []
        - name: feat.pandas_ta
          members: []
    - title: q.stats
      desc: "Return-stream statistics: performance, alpha/beta, rolling diagnostics, and the chained `Returns` helper (no plotting dependency)."
      contents:
        - name: stats
          include_imports: true
    - title: q.plot
      desc: "Plotting + performance reports (tearsheets)."
      contents:
        - name: plot
          include_imports: true
        - plot.interactive
    - title: q.data
      desc: "Loading/saving local files, market data sources (Yahoo Finance, Binance, DuckDB) each exposed as their own submodule, prepackaged sample datasets, and the master securities database."
      contents:
        - name: data
          include_imports: true
        - data.local
        - data.datasets
        - name: data.sources
          include_imports: true
        - data.sources.yfinance
        - data.sources.binance
        - data.sources.duckdb
    - title: q.model
      desc: "ML model utilities: PyTorch helpers (model summaries via torchinfo) and leakage-aware CV splitters named after scikit-learn's model_selection."
      contents:
        - name: model
          include_imports: true
        - model.torch
        - model.selection
    - title: q.utils
      desc: "Shared utilities."
      contents:
        - utils
